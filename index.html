<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart College Recommendation System</title>

    <link rel="stylesheet" href="style.css">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
</head>

<body>

    <div class="bg-blur blur1"></div>
    <div class="bg-blur blur2"></div>

    <header class="navbar">

        <div class="logo">
            🎓 Smart College
        </div>

        <nav>
            <a href="index.html">Home</a>
            <a href="compare.html">Compare</a>
            <a href="favorites.html">Favorites</a>
            <a href="admin.html">Admin</a>
            <a href="login.html">Login</a>
        </nav>
        <div id="userInfo"
           style="
           text-align:center;
            margin-top:10px;
            font-weight:600;">
        </div>

    </header>

    <section class="hero">

        <div class="hero-card">

            <h1>Smart College Recommendation System</h1>

            <p>
                Find the best college based on KCET, COMEDK,
                Management Quota, Branch Preference,
                Location and Fee Structure.
            </p>

        </div>

    </section>

    <section class="search-panel">

        <h2>Find Your Perfect College</h2>

        <div class="form-grid">

            <select id="exam">
                <option value="">Select Exam</option>
                <option value="KCET">KCET</option>
                <option value="COMEDK">COMEDK</option>
                <option value="Management">Management</option>
            </select>

            <input id="rank" type="number" placeholder="Enter Rank">

            <select id="course">
                <option value="">Select Course</option>
                <option>B.Tech</option>
                <option>BBA</option>
                <option>B.Com</option>
            </select>

            <select id="branch">
                <option value="">Select Branch</option>
            </select>

            <select id="location">
                <option value="">Select Location</option>
                <option>Bengaluru</option>
                <option>Chennai</option>
            </select>

            <select id="feesFilter">
                <option value="">Maximum Fees</option>
                <option value="100000">₹1,00,000</option>
                <option value="200000">₹2,00,000</option>
                <option value="500000">₹5,00,000</option>
            </select>

        </div>

        <button class="recommend-btn" onclick="recommend()">
            🔍 Recommend Colleges
        </button>

    </section>

    <section class="results-section">

        <h2>Recommended Colleges</h2>

        <div id="result" class="results-grid"></div>

    </section>

    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

    <script src="firebase.js"></script>
    <script src="app.js"></script>

</body>

</html>
